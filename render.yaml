services:
  - type: web
    name: radia-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false   # Set this to your Vercel frontend URL after deploying
    plan: free
